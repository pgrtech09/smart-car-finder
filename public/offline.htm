<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offline – Smart Car Finder</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", sans-serif;
      background: #0a0e1a;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
    }
    .icon {
      width: 80px; height: 80px;
      background: linear-gradient(135deg, #4c6ef5, #06b6d4);
      border-radius: 24px;
      display: flex; align-items: center; justify-content: center;
      font-size: 36px;
      margin-bottom: 24px;
      box-shadow: 0 0 30px rgba(76,110,245,0.4);
    }
    h1 { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
    p { font-size: 14px; color: #64748b; line-height: 1.6; max-width: 280px; margin: 0 auto 24px; }
    button {
      background: linear-gradient(135deg, #4c6ef5, #06b6d4);
      border: none; border-radius: 12px;
      color: #fff; font-size: 14px; font-weight: 600;
      padding: 12px 24px; cursor: pointer;
      box-shadow: 0 0 20px rgba(76,110,245,0.3);
    }
    button:hover { opacity: 0.9; }
    .note { margin-top: 16px; font-size: 12px; color: #334155; }
  </style>
</head>
<body>
  <div class="icon">🚗</div>
  <h1>You're Offline</h1>
  <p>Smart Car Finder needs an internet connection to sync your parking data. Your last saved location is still accessible.</p>
  <button onclick="window.location.reload()">Try Again</button>
  <p class="note">Cached data is still available when offline.</p>
</body>
</html>
